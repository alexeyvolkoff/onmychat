[settings]
DEFAULT_SYSTEM_PROMPT_FILE = default.txt
DEFAULT_ASSISTANT_NAME = June
DEFAULT_ASSISTANT_TITLE = Junior assistant

GATEWAY_URL = https://onmydisk.net
AI_TOKEN = your_ai_token_here

OLLAMA_URL = http://localhost:11434
CODE_BASE_URL = http://localhost:4096
#CODE_MODEL = gemma4:12b-32k
CODE_MODEL = opencode/big-pickle
DEFAULT_MODEL = gemma4:latest

# Models for different modes
FUN_MODEL = gemma4:latest
WORK_MODEL = gemma4:latest
LLM_NUM_CTX = 32768

DEFAULT_KB_ID = omd
STORAGE_ROOT = /path/to/shared/storage

# ComfyUI Integration (Image Generation)
COMFY_API_URL = http://localhost:8188
WORKFLOW_PATH = flow.json
COMFY_OUTPUT_DIR = /path/to/ComfyUI/output
COMFY_INPUT_DIR = /path/to/ComfyUI/input
AVATAR_DIR = user_avatars
APP_ROOT_DIR = /path/to/onmychat

# Session History
HISTORY_LIMIT = 300
HISTORY_DIR = history

# Style Models for Image Generation
REALISTIC_MODEL = CyberRealisticXLPlay_V10.0_FP16.safetensors
PERFECT_MODEL = cyberrealisticPony_v180Coreshift.safetensors
FANTASY_MODEL = CyberIllustrious_v110.safetensors
TOONED_MODEL = CyberRealistic_PonySemi_V5.safetensors

# Search and RAG Settings
SEARCH_THRESHOLD = 0.75
RAG_THRESHOLD = 0.75
RAG_TOP_K = 5
SEARCH_TOP_K = 20
