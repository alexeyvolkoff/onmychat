[settings]
# System prompt for initial LLM behavior
DEFAULT_SYSTEM_PROMPT_FILE = default.txt

# Telegram bot token
TELEGRAM_BOT_TOKEN = your_bot_token_here

# OpenWebUI connection
OPENWEBUI_URL = http://localhost:8000
OPENWEBUI_API_KEY = sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# LLM defaults
DEFAULT_MODEL = gemma3:12b
NSFW_MODEL = do_your_reasearch_bro
SFW_MODEL = gemma3:12b
DEFAULT_API_KEY = sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
DEFAULT_KB_ID = your_default_kb_id_here

# Bot owner
OWNER_ID = 123456789
OWNER_API_KEY = sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ComfyUI integration
COMFY_API_URL = http://localhost:8188
WORKFLOW_GENERAL_PATH = flow.json
WORKFLOW_CHARACTER_PATH = character_flow.json
COMFY_OUTPUT_DIR = /path/to/ComfyUI/output
COMFY_INPUT_DIR = /path/to/ComfyUI/input
AVATAR_DIR = user_avatars

