[settings]
# System prompt for initial LLM behavior
DEFAULT_SYSTEM_PROMPT_FILE = prompts/default.txt
DEFAULT_ASSISTANT_NAME = June
DEFAULT_ASSISTANT_TITLE = Junior assistant

# Telegram bot token
TELEGRAM_BOT_TOKEN = your_bot_token_here
# Gateway URL for OMD (On My Disk)
GATEWAY_URL = https://onmydisk.net

# OLLAMA URL
OLLAMA_URL = http://localhost:11434

# LLM defaults
# Model to use for main interaction
DEFAULT_MODEL = gemma3:12b
# Safe for work model, used for RAG and utility tasks
SFW_MODEL = gemma3:12b
# NSFW model, if you want something spicier
NSFW_MODEL = do_your_reasearch_bro
DEFAULT_KB_ID = your_default_kb_id_here

# MCP Settings
# Model for intent checking and tool use (FunctionGemma)
MCP_MODEL = functiongemma

# App settings
# Root directory for backend storage
STORAGE_ROOT = /home/user/backend_storage
# Application root directory
APP_ROOT_DIR = /home/user/projects/onmychat
# Number of history items to keep in context
HISTORY_LIMIT = 20

# ComfyUI integration
COMFY_API_URL = http://localhost:8188
WORKFLOW_PATH = flow.json
COMFY_OUTPUT_DIR = /path/to/ComfyUI/output
COMFY_INPUT_DIR = /path/to/ComfyUI/input
AVATAR_DIR = user_avatars

# Style Models for Image Generation
# Each style has a specific model file (safetensors)
REALISTIC_MODEL = analogMadnessSDXL_xl5.safetensors
REALISTIC_MODEL_NSFW = analogMadnessSDXL_xl5.safetensors
REALISTIC2_MODEL = realvisxlV40.safetensors
REALISTIC2_MODEL_NSFW = realvisxlV40.safetensors
PERFECT_MODEL = cyberrealisticPony_v141.safetensors
PERFECT_MODEL_NSFW = cyberrealisticPony_v141.safetensors
FANTASY_MODEL = novaillustrousNSFW_v20.safetensors
FANTASY_MODEL_NSFW = novaillustrousNSFW_v20.safetensors
TOONED_MODEL = cyberrealisticPony_semiRealV40.safetensors
TOONED_MODEL_NSFW = cyberrealisticPony_semiRealV40.safetensors
PLEASURE_MODEL = pleasurechest_v1.safetensors
PLEASURE_MODEL_NSFW = pleasurechest_v1.safetensors

# Console Usage Reporting
CONSOLE_API_URL = https://onmydisk.net/api/v1
CONSOLE_SHARED_SECRET = your_shared_secret_here
