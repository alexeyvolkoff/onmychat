stages:
  - deploy

deploy_job:
  stage: deploy
  tags:
    - linux
  only:
    - main
  script:
    - sudo -u alexey git -C /home/alexey/projects/onmychat fetch --all
    - sudo -u alexey git -C /home/alexey/projects/onmychat checkout main
    - sudo -u alexey git -C /home/alexey/projects/onmychat pull
    - sudo systemctl restart onmychat

upgrade_job:
  stage: deploy
  tags:
    - linux
  when: manual
  script:
  script:
    - |
      cat << 'EOF' > /tmp/ci_upgrade.py
      import os, pty, sys, select
      def run_as_user(command):
          password = os.environ.get('SUDO_PASSWORD')
          if not password: sys.exit(1)
          master, slave = pty.openpty()
          pid = os.fork()
          if pid == 0:
              os.close(master); os.dup2(slave, 0); os.dup2(slave, 1); os.dup2(slave, 2); os.close(slave)
              os.execlp("su", "su", "-", "alexey", "-c", command)
          else:
              os.close(slave); password_sent = False
              while True:
                  r, _, _ = select.select([master], [], [], 1)
                  if master in r:
                      try:
                          data = os.read(master, 1024)
                          if not data: break
                          sys.stdout.buffer.write(data); sys.stdout.flush()
                          if not password_sent and (b"Password:" in data or b"password" in data.lower()):
                              os.write(master, password.encode() + b"\n"); password_sent = True
                      except OSError: break
                  else:
                      if os.waitpid(pid, os.WNOHANG)[0] != 0: break
              _, status = os.waitpid(pid, 0)
              sys.exit(os.waitstatus_to_exitcode(status))
      if __name__ == "__main__": run_as_user(sys.argv[1])
      EOF
    - python3 /tmp/ci_upgrade.py "cd /home/alexey/projects/onmychat && if [ ! -d venv ]; then python3 -m venv venv; fi && source venv/bin/activate && pip install -r requirements.txt && playwright install"
    - rm /tmp/ci_upgrade.py
    - sudo systemctl restart onmychat
