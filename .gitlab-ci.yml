stages:
  - deploy

deploy_job:
  stage: deploy
  tags:
    - linux
  only:
    - main
  script:
    - sudo -u alexey git -C /home/alexey/projects/onmychat fetch --all
    - sudo -u alexey git -C /home/alexey/projects/onmychat checkout main
    - sudo -u alexey git -C /home/alexey/projects/onmychat pull
    - sudo systemctl restart onmychat

upgrade_job:
  stage: deploy
  tags:
    - linux
  when: manual
  script:
    - python3 /home/alexey/projects/onmychat/ci_upgrade.py "cd /home/alexey/projects/onmychat && if [ ! -d venv ]; then python3 -m venv venv; fi && source venv/bin/activate && pip install -r requirements.txt && playwright install"
    - sudo systemctl restart onmychat
